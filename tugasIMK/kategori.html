<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategori | StoryCentral</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header (Pastikan sama dengan index.html) -->
    <header class="glass-header">
        <div class="header-container">
            <div class="header-section left">
                <a href="index.html" class="logo">Story<span>Central</span></a>
            </div>
            <nav class="header-section center main-nav">
                <a href="index.html">Beranda</a>
                <a href="kategori.html" class="active">Kategori</a>
                <a href="about.html">Tentang</a>
            </nav>
            <div class="header-section right">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Cari cerita...">
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="section-title" style="margin-top: 30px;">
            <h3>Jelajahi Kategori</h3>
        </div>

        <!-- Visual Kategori Cards -->
        <div class="modern-grid" style="margin-bottom: 50px;">
            <!-- Gunakan onclick untuk memanggil fungsi filter dari script.js -->
            <div class="glass-box category-card" onclick="filterByPage('Romansa')" style="text-align: center; cursor: pointer; transition: 0.3s; border-bottom: 4px solid #ff7e5f;">
                <h4>Romansa</h4>
                <p style="font-size: 0.7rem; color: var(--text-dim);">Kisah kasih dan perasaan.</p>
            </div>
            <div class="glass-box category-card" onclick="filterByPage('Sci-Fi')" style="text-align: center; cursor: pointer; transition: 0.3s; border-bottom: 4px solid #00a2ff;">
                <h4>Sci-Fi</h4>
                <p style="font-size: 0.7rem; color: var(--text-dim);">Teknologi dan masa depan.</p>
            </div>
            <div class="glass-box category-card" onclick="filterByPage('Horor')" style="text-align: center; cursor: pointer; transition: 0.3s; border-bottom: 4px solid #ff004c;">
                <h4>Horor</h4>
                <p style="font-size: 0.7rem; color: var(--text-dim);">Misteri dan ketakutan.</p>
            </div>
            <div class="glass-box category-card" onclick="filterByPage('Fantasi')" style="text-align: center; cursor: pointer; transition: 0.3s; border-bottom: 4px solid #a259ff;">
                <h4>Fantasi</h4>
                <p style="font-size: 0.7rem; color: var(--text-dim);">Dunia ajaib dan sihir.</p>
            </div>
        </div>

        <div class="section-title">
            <h3 id="category-label">Menampilkan: Semua Cerita</h3>
        </div>
        
        <!-- ID diubah menjadi story-grid agar sesuai dengan fungsi renderStories di script.js -->
        <div class="modern-grid" id="story-grid">
            <!-- Konten hasil filter masuk ke sini -->
        </div>
    </div>

    <!-- Panggil script.js -->
    <script src="script.js"></script>

    <script>
        // Fungsi pembantu khusus halaman kategori
        function filterByPage(genre) {
            document.getElementById('category-label').innerText = "Menampilkan: " + genre;
            
            // Memanggil fungsi filterByCategory yang ada di script.js
            if (typeof filterByCategory === "function") {
                filterByCategory(genre);
            }
        }

        // Jalankan render awal saat halaman dibuka
        window.onload = () => {
            if (typeof renderStories === "function") {
                renderStories(dataCerita);
            }
        };
    </script>
</body>
</html>
